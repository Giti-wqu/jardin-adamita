<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Jardín Adamita — Memorias del Principio</title>
<meta name="description" content="Antes de la ropa. Antes del nombre. Antes del miedo. Memorias del Principio es un libro de doctrina adamita sobre el cuerpo, el deseo, la vergüenza y el retorno a lo que siempre fuiste.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#0d0803;--panel:#160e06;--ink:#1a0f06;
  --parch:#f0e3ca;--cream:#e0cfae;--sepia:#7b4f2e;
  --gold:#c4973a;--gold2:#e8b84b;--faded:#9c7a5b;
  --dim:#4a3020;--border:rgba(196,151,58,.15);
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--parch);font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;line-height:1.75;min-height:100vh}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.4}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:58px;background:rgba(13,8,3,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.logo{font-family:'Cormorant SC',serif;font-size:1.05rem;font-weight:300;letter-spacing:.18em;color:var(--gold);cursor:pointer}
.logo span{color:var(--faded);font-size:.62rem;display:block;letter-spacing:.3em;margin-top:-3px}
.topnav{display:flex;align-items:center;gap:.2rem}
.tnav{font-family:'Cormorant SC',serif;font-size:.7rem;letter-spacing:.22em;color:var(--faded);background:none;border:none;padding:.4rem 1rem;cursor:pointer;transition:color .2s;text-transform:uppercase}
.tnav:hover,.tnav.active{color:var(--gold)}
.tnav.active{border-bottom:1px solid var(--gold)}
.topright{display:flex;align-items:center;gap:.8rem}
.user-name{font-style:italic;color:var(--faded);font-size:.88rem}
.admin-pill{font-family:'Cormorant SC',serif;font-size:.6rem;letter-spacing:.18em;background:var(--gold);color:var(--dark);padding:.15rem .5rem}
.btn-login{font-family:'Cormorant SC',serif;font-size:.68rem;letter-spacing:.22em;color:var(--faded);border:1px solid var(--border);background:none;padding:.35rem .9rem;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-login:hover{color:var(--gold);border-color:var(--gold)}
.btn-register{font-family:'Cormorant SC',serif;font-size:.68rem;letter-spacing:.22em;color:var(--dark);background:var(--gold);border:1px solid var(--gold);padding:.35rem .9rem;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-register:hover{background:var(--gold2)}
.btn-signout{font-family:'Cormorant SC',serif;font-size:.65rem;letter-spacing:.2em;color:var(--dim);background:none;border:1px solid transparent;padding:.3rem .7rem;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-signout:hover{color:var(--faded);border-color:var(--border)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem;backdrop-filter:blur(6px)}
.modal-overlay.hidden{display:none}
.auth-modal{background:var(--panel);border:1px solid var(--border);width:100%;max-width:420px;padding:2.8rem;position:relative}
.modal-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;color:var(--dim);font-size:1.1rem;cursor:pointer;padding:.3rem;transition:color .2s;line-height:1}
.modal-close:hover{color:var(--gold)}
.modal-title{font-family:'Cormorant SC',serif;font-size:1.6rem;font-weight:300;color:var(--parch);text-align:center;margin-bottom:.4rem}
.modal-sub{font-style:italic;color:var(--faded);text-align:center;font-size:.92rem;margin-bottom:2rem}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem}
.modal-tab{flex:1;font-family:'Cormorant SC',serif;font-size:.7rem;letter-spacing:.25em;color:var(--faded);background:none;border:none;padding:.7rem;cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-family:'Cormorant SC',serif;font-size:.62rem;letter-spacing:.3em;color:var(--faded);margin-bottom:.35rem;text-transform:uppercase}
.form-input{width:100%;background:rgba(196,151,58,.04);border:1px solid var(--border);color:var(--parch);padding:.75rem 1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;outline:none;transition:border-color .2s}
.form-input:focus{border-color:rgba(196,151,58,.4)}
.form-input::placeholder{color:var(--dim)}
.btn-full{width:100%;background:var(--gold);color:var(--dark);border:none;font-family:'Cormorant SC',serif;font-size:.78rem;letter-spacing:.3em;padding:.85rem;cursor:pointer;transition:all .2s;margin-top:.4rem;text-transform:uppercase}
.btn-full:hover{background:var(--gold2)}
.btn-full:disabled{opacity:.45;cursor:not-allowed}
.msg-error{background:rgba(196,74,58,.1);border:1px solid rgba(196,74,58,.3);color:#e88;padding:.65rem 1rem;font-size:.88rem;margin-bottom:.8rem}
.msg-ok{background:rgba(58,138,90,.1);border:1px solid rgba(58,138,90,.3);color:#8e8;padding:.65rem 1rem;font-size:.88rem;margin-bottom:.8rem}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 2rem 4rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 35%,rgba(196,151,58,.07) 0%,transparent 70%)}
.ornament{color:var(--gold);letter-spacing:.5em;margin-bottom:2.5rem;font-size:1rem}
.hero-title{font-family:'Cormorant SC',serif;font-size:clamp(2.6rem,8vw,5.5rem);font-weight:300;letter-spacing:.08em;line-height:1.1;color:var(--parch);margin-bottom:.4rem;animation:fadeUp 1s ease forwards .3s;opacity:0}
.hero-sub{font-size:clamp(.82rem,2vw,1rem);font-weight:300;font-style:italic;color:var(--faded);letter-spacing:.25em;text-transform:uppercase;animation:fadeUp 1s ease forwards .55s;opacity:0;margin-bottom:3rem}
.hero-hr{width:55px;height:1px;background:var(--gold);margin:0 auto 3rem;animation:fadeUp 1s ease forwards .7s;opacity:0}
.hero-verse{font-size:clamp(1rem,2.4vw,1.3rem);font-style:italic;font-weight:300;color:var(--cream);max-width:580px;line-height:1.95;animation:fadeUp 1s ease forwards .85s;opacity:0;margin-bottom:3.5rem}
.hero-verse em{font-style:normal;color:var(--gold)}
.hero-btns{animation:fadeUp 1s ease forwards 1.1s;opacity:0;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-hero{font-family:'Cormorant SC',serif;font-size:.85rem;letter-spacing:.28em;text-decoration:none;padding:.95rem 2.2rem;cursor:pointer;transition:all .25s;text-transform:uppercase;border:none;display:inline-block}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold2);transform:translateY(-2px)}
.btn-ghost{color:var(--gold);background:transparent;border:1px solid rgba(196,151,58,.4)}
.btn-ghost:hover{border-color:var(--gold);background:rgba(196,151,58,.07);transform:translateY(-2px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTIONS ── */
.sec{padding:5.5rem 2rem;max-width:820px;margin:0 auto}
.sec-label{font-family:'Cormorant SC',serif;font-size:.68rem;letter-spacing:.4em;color:var(--gold);margin-bottom:1.8rem;display:block;text-transform:uppercase}
.sec h2{font-family:'Cormorant SC',serif;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:300;color:var(--parch);line-height:1.2;margin-bottom:1.8rem}
.sec p{font-size:clamp(.97rem,2vw,1.1rem);color:var(--cream);font-weight:300;margin-bottom:1.4rem;text-align:justify}
.verses-block{border-left:2px solid rgba(196,151,58,.25);padding:2rem 2.5rem;margin:3rem 0;background:rgba(196,151,58,.025)}
.verse-entry{margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.verse-entry:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.verse-src{font-family:'Cormorant SC',serif;font-size:.62rem;letter-spacing:.28em;color:var(--gold);margin-bottom:.65rem;display:block}
.verse-q{font-style:italic;font-size:clamp(1rem,2.2vw,1.22rem);color:var(--parch);line-height:1.9;margin:0;text-align:left}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));border:1px solid var(--border);margin:3rem 0}
.book-cell{padding:1.1rem 1.3rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .18s}
.book-cell:hover{background:rgba(196,151,58,.05)}
.book-n{font-family:'Cormorant SC',serif;font-size:.6rem;letter-spacing:.25em;color:var(--gold);display:block;margin-bottom:.25rem}
.book-t{font-size:.88rem;color:var(--faded);font-style:italic;margin:0;text-align:left}
.dark-band{background:rgba(196,151,58,.035);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:5.5rem 2rem}
.divline{display:flex;align-items:center;gap:1.5rem;padding:0 2rem;max-width:720px;margin:0 auto}
.divline::before,.divline::after{content:'';flex:1;height:1px;background:rgba(196,151,58,.18)}
.divline span{color:var(--gold);font-size:.9rem;white-space:nowrap}

/* ── CONTACT FORM ── */
.contact-form{max-width:560px;margin:2rem auto 0}
.contact-input{width:100%;background:rgba(196,151,58,.04);border:1px solid var(--border);color:var(--parch);padding:.75rem 1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:1rem}
.contact-input:focus{border-color:rgba(196,151,58,.4)}
.contact-input::placeholder{color:var(--dim)}
.contact-ta{width:100%;background:rgba(196,151,58,.04);border:1px solid var(--border);color:var(--parch);padding:.75rem 1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;outline:none;resize:vertical;min-height:130px;transition:border-color .2s;margin-bottom:1rem}
.contact-ta:focus{border-color:rgba(196,151,58,.4)}
.contact-ta::placeholder{color:var(--dim)}
.contact-send{background:var(--gold);color:var(--dark);border:none;font-family:'Cormorant SC',serif;font-size:.78rem;letter-spacing:.3em;padding:.85rem 2.5rem;cursor:pointer;transition:all .2s;text-transform:uppercase}
.contact-send:hover{background:var(--gold2)}
.contact-note{font-style:italic;color:var(--dim);font-size:.85rem;margin-top:.8rem;text-align:center}

/* ── FORO ── */
.app-layout{display:flex;max-width:1100px;margin:0 auto;min-height:calc(100vh - 58px)}
.sidebar{width:230px;min-width:230px;border-right:1px solid var(--border);padding:2rem 0;display:flex;flex-direction:column;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto}
.sb-label{font-family:'Cormorant SC',serif;font-size:.62rem;letter-spacing:.35em;color:var(--gold);padding:0 1.5rem;margin-bottom:.6rem;display:block;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 1.5rem;cursor:pointer;color:var(--faded);font-size:.9rem;background:none;border:none;width:100%;text-align:left;transition:all .15s}
.sb-item:hover{color:var(--parch);background:rgba(196,151,58,.05)}
.sb-item.active{color:var(--gold);background:rgba(196,151,58,.08)}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);flex-shrink:0}
.sb-item.active .sb-dot{background:var(--gold)}
.sb-sep{border:none;border-top:1px solid var(--border);margin:1rem 0}
.new-btn{margin:1rem 1.5rem 0;background:none;border:1px solid var(--border);color:var(--gold);font-family:'Cormorant SC',serif;font-size:.68rem;letter-spacing:.22em;padding:.65rem 1rem;cursor:pointer;transition:all .2s;text-transform:uppercase;width:calc(100% - 3rem)}
.new-btn:hover{background:rgba(196,151,58,.07);border-color:var(--gold)}
.sb-stat{padding:0 1.5rem;margin-top:1.5rem}
.stat-row{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.85rem}
.stat-l{color:var(--faded);font-style:italic}
.stat-v{color:var(--gold);font-family:'Cormorant SC',serif}
.content{flex:1;padding:2rem;min-width:0}

/* ── POSTS ── */
.post-card{border:1px solid var(--border);background:var(--panel);padding:1.4rem 1.6rem;margin-bottom:.9rem;cursor:pointer;transition:all .18s}
.post-card:hover{border-color:rgba(196,151,58,.3);background:rgba(22,14,6,.9)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.pc-title{font-family:'Cormorant SC',serif;font-size:1rem;font-weight:400;color:var(--parch);margin-bottom:.3rem}
.pc-preview{color:var(--faded);font-size:.88rem;line-height:1.55}
.pc-meta{display:flex;align-items:center;gap:.8rem;margin-top:.7rem;font-size:.78rem;color:var(--dim);flex-wrap:wrap}
.pc-author{color:var(--sepia);font-style:italic}
.pc-author.is-admin{color:var(--gold)}
.pc-tags{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;flex-shrink:0}
.tag-garden{font-family:'Cormorant SC',serif;font-size:.58rem;letter-spacing:.18em;color:var(--dark);background:var(--gold);padding:.12rem .45rem}
.tag-cat{font-family:'Cormorant SC',serif;font-size:.58rem;letter-spacing:.18em;color:var(--faded);border:1px solid var(--border);padding:.12rem .45rem}
.pc-img{width:70px;height:52px;object-fit:cover;opacity:.7;flex-shrink:0;border:1px solid var(--border)}

/* ── POST DETALLE ── */
.back-btn{background:none;border:none;color:var(--faded);font-family:'Cormorant Garamond',serif;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;margin-bottom:1.5rem;padding:0;transition:color .2s}
.back-btn:hover{color:var(--gold)}
.pf{border:1px solid var(--border);background:var(--panel);padding:2rem;margin-bottom:2rem}
.pf-title{font-family:'Cormorant SC',serif;font-size:1.35rem;font-weight:300;color:var(--parch);margin-bottom:.8rem}
.pf-body{color:var(--cream);font-size:1rem;line-height:1.8;white-space:pre-wrap}
.pf-images{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.2rem}
.pf-img{max-width:240px;max-height:200px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.pf-img:hover{opacity:.85}
.pf-meta{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--dim)}
.replies-hdr{font-family:'Cormorant SC',serif;font-size:.72rem;letter-spacing:.28em;color:var(--gold);margin-bottom:1.1rem;text-transform:uppercase}
.reply-card{border-left:2px solid var(--border);padding:1.1rem 1.4rem;margin-bottom:.9rem;background:rgba(22,14,6,.45)}
.reply-card.is-admin{border-left-color:var(--gold);background:rgba(196,151,58,.035)}
.reply-hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:.55rem;flex-wrap:wrap}
.reply-author{font-size:.83rem;color:var(--sepia);font-style:italic}
.reply-author.is-admin{color:var(--gold)}
.reply-pill{font-family:'Cormorant SC',serif;font-size:.56rem;letter-spacing:.18em;color:var(--dark);background:var(--gold);padding:.1rem .4rem}
.reply-date{font-size:.76rem;color:var(--dim);margin-left:auto}
.reply-body{color:var(--cream);font-size:.97rem;line-height:1.75;white-space:pre-wrap}
.reply-imgs{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.reply-img{max-width:180px;max-height:150px;object-fit:cover;border:1px solid var(--border);cursor:pointer}

/* ── FORMULARIO REPLY ── */
.reply-form{margin-top:2rem;border:1px solid var(--border);background:var(--panel);padding:1.5rem}
.reply-lbl{font-family:'Cormorant SC',serif;font-size:.65rem;letter-spacing:.28em;color:var(--gold);display:block;margin-bottom:.55rem;text-transform:uppercase}
.reply-ta{width:100%;background:rgba(196,151,58,.035);border:1px solid var(--border);color:var(--parch);padding:.75rem 1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;outline:none;resize:vertical;min-height:90px;transition:border-color .2s}
.reply-ta:focus{border-color:rgba(196,151,58,.35)}
.reply-ta::placeholder{color:var(--dim)}
.upload-row{display:flex;align-items:center;gap:.8rem;margin-top:.7rem}
.upload-btn{font-family:'Cormorant SC',serif;font-size:.65rem;letter-spacing:.2em;color:var(--faded);background:none;border:1px solid var(--border);padding:.4rem .9rem;cursor:pointer;transition:all .2s;text-transform:uppercase}
.upload-btn:hover{color:var(--gold);border-color:var(--gold)}
.upload-note{font-style:italic;color:var(--dim);font-size:.83rem}
.img-previews{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.6rem}
.img-preview-item{position:relative;display:inline-block}
.img-preview-item img{width:72px;height:56px;object-fit:cover;border:1px solid var(--border)}
.img-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--dark);border:1px solid var(--border);color:var(--faded);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.img-remove:hover{color:var(--gold);border-color:var(--gold)}
.send-btn{background:var(--gold);color:var(--dark);border:none;font-family:'Cormorant SC',serif;font-size:.72rem;letter-spacing:.22em;padding:.65rem 1.8rem;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-top:.8rem}
.send-btn:hover{background:var(--gold2)}
.send-btn:disabled{opacity:.45;cursor:not-allowed}

/* ── NUEVA ENTRADA ── */
.np{max-width:600px}
.np-title{font-family:'Cormorant SC',serif;font-size:1.25rem;font-weight:300;color:var(--parch);margin-bottom:.3rem}
.np-sub{color:var(--faded);font-style:italic;font-size:.9rem;margin-bottom:2rem}
.cats-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.cat-btn{font-family:'Cormorant SC',serif;font-size:.62rem;letter-spacing:.2em;padding:.3rem .8rem;cursor:pointer;border:1px solid var(--border);background:none;color:var(--faded);transition:all .15s;text-transform:uppercase}
.cat-btn:hover,.cat-btn.sel{color:var(--gold);border-color:var(--gold);background:rgba(196,151,58,.06)}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox.hidden{display:none}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border:1px solid var(--border)}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--dim);font-size:.78rem;font-style:italic;letter-spacing:.1em}

/* ── EMPTY ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--faded)}
.empty-orn{font-size:2rem;color:var(--border);margin-bottom:1rem}
.empty-t{font-family:'Cormorant SC',serif;font-size:1rem;color:var(--dim);margin-bottom:.4rem}
.loading-msg{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--faded);font-style:italic}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--dim)}

@media(max-width:680px){
  .sidebar{display:none}
  .topbar{padding:0 1rem}
  .logo span{display:none}
  .tnav{padding:.4rem .6rem;font-size:.65rem}
  .content{padding:1.2rem}
  .hero{padding:4.5rem 1.5rem 3.5rem}
  .sec{padding:3.5rem 1.5rem}
  .hero-btns,.gate-btns{flex-direction:column;align-items:center}
  .btn-hero{width:100%;max-width:280px;text-align:center}
}
</style>
</head>
<body>

<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="modal-overlay hidden" id="authModal">
  <div class="auth-modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">El Jardín</div>
    <div class="modal-sub">Para participar en el foro</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="modal-tab" id="tabReg" onclick="switchTab('register')">Unirse</button>
    </div>
    <div id="authMsg"></div>
    <div id="usernameRow" class="form-group" style="display:none">
      <label class="form-label">Tu nombre en el jardín</label>
      <input class="form-input" id="fUsername" placeholder="Cómo te conocerán aquí">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="fEmail" type="email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="fPass" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="btn-full" id="authBtn" onclick="doAuth()">Entrar</button>
  </div>
</div>

<div id="root"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN
// ══════════════════════════════════════════════
const SB_URL    = 'https://fyosedvcdsfxgerysixb.supabase.co'
const SB_ANON   = 'sb_publishable_UfOqWAj0TfPyVQK_g0wcKQ_eHqV-BDU'
const ADMIN     = 'jardinadamita@proton.me'
const AMAZON_ES = 'https://www.amazon.es/dp/B0H33WHVJJ'
const AMAZON_EN = 'https://www.amazon.com/s?k=Memories+of+the+Beginning+Those+Who+Remember'

const sb = supabase.createClient(SB_URL, SB_ANON)

let S = {
  user: null, profile: null, isAdmin: false,
  page: 'home', view: 'list',
  posts: [], post: null, replies: [],
  category: null,
  stats: { posts: 0, members: 0 },
  postFiles: [], replyFiles: [],
}
let authMode = 'login'
let afterLoginDo = null  // acción a ejecutar tras login

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (session?.user) await signedIn(session.user)
  render()

  sb.auth.onAuthStateChange(async (ev, session) => {
    if (ev === 'SIGNED_IN') {
      await signedIn(session.user)
      closeModal()
      // Ejecutar acción pendiente (ej: ir al foro)
      if (afterLoginDo) { const fn = afterLoginDo; afterLoginDo = null; await fn() }
      else { await loadPosts(); await loadStats(); render() }
    }
    if (ev === 'SIGNED_OUT') {
      S.user=null; S.profile=null; S.isAdmin=false; S.page='home'; render()
    }
  })
}

async function signedIn(user) {
  S.user = user
  S.isAdmin = user.email === ADMIN
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single()
  if (data) { S.profile = data; return }
  const username = S.isAdmin ? 'El Jardín' : user.email.split('@')[0]
  const { data: p } = await sb.from('profiles')
    .insert({ id: user.id, username, is_admin: S.isAdmin }).select().single()
  S.profile = p
}

async function loadPosts() {
  let q = sb.from('posts')
    .select('*, profiles(username,is_admin), replies(count)')
    .order('created_at', { ascending: false })
  if (S.category) q = q.eq('category', S.category)
  const { data } = await q
  S.posts = data || []
}

async function loadPost(id) {
  const [{ data: p }, { data: r }] = await Promise.all([
    sb.from('posts').select('*, profiles(username,is_admin)').eq('id', id).single(),
    sb.from('replies').select('*, profiles(username,is_admin)')
      .eq('post_id', id).order('created_at', { ascending: true })
  ])
  S.post = p; S.replies = r || []
}

async function loadStats() {
  const [{ count: posts }, { count: members }] = await Promise.all([
    sb.from('posts').select('*', { count: 'exact', head: true }),
    sb.from('profiles').select('*', { count: 'exact', head: true })
  ])
  S.stats = { posts: posts||0, members: members||0 }
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render() {
  document.getElementById('root').innerHTML = topbar() + body()
}

function topbar() {
  const right = S.user ? `
    <div class="topright">
      <span class="user-name">${esc(S.profile?.username||'')}</span>
      ${S.isAdmin?'<span class="admin-pill">El Jardín</span>':''}
      <button class="btn-signout" onclick="sb.auth.signOut()">Salir</button>
    </div>
  ` : `
    <div class="topright">
      <button class="btn-login" onclick="openModal('login')">Entrar</button>
      <button class="btn-register" onclick="openModal('register')">Unirse</button>
    </div>
  `
  return `
    <header class="topbar">
      <div class="logo" onclick="goHome()">El Jardín <span>Comunidad Adamita</span></div>
      <nav class="topnav">
        <button class="tnav ${S.page==='home'?'active':''}" onclick="goHome()">Inicio</button>
        <button class="tnav ${S.page==='forum'?'active':''}" onclick="goForum()">Foro</button>
        <button class="tnav" onclick="scrollToContact()">Escribir</button>
      </nav>
      ${right}
    </header>
  `
}

function body() {
  if (S.page === 'home') return homePage()
  if (S.page === 'forum') return forumPage()
  return homePage()
}

// ══════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════
function homePage() {
  const books = [
    ['I','Del Estado Original'],['II','Del Cuerpo'],['III','Del Deseo y del Cuerpo Honesto'],
    ['IV','De la Ropa como Primer Olvido'],['V','De la Verdad y la Palabra'],['VI','De la Comunidad'],
    ['VII','De la Vida Justa'],['VIII','De los Ritos'],['IX','De las Prohibiciones'],
    ['X','De la Serpiente'],['XI','Del Jardín y de Dios'],['XII','De Cómo se Difunde lo que Vale'],
    ['XIII','Del Silencio'],['XIV','Del Tiempo'],['XV','De la Naturaleza'],
    ['XVI','De la Muerte'],['XVII','De los Hijos'],['XVIII','Del Miedo'],
    ['XIX','Del Amor y las Relaciones'],['XX','De la Soledad'],['XXI','De la Enfermedad y el Dolor'],
    ['XXII','De la Belleza'],['XXIII','De la Historia Viva'],['XXIV','De la Alegría']
  ]
  return `<div>
    <!-- HERO -->
    <section class="hero">
      <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
      <h1 class="hero-title">Memorias<br>del Principio</h1>
      <p class="hero-sub">Escrituras de los que Recuerdan</p>
      <div class="hero-hr"></div>
      <p class="hero-verse">Antes de la ropa. Antes del nombre. Antes del miedo.<br>
      Había un momento en que el ser humano<br>era <em>una sola cosa consigo mismo.</em></p>
      <div class="hero-btns">
        <a class="btn-hero btn-gold" href="${AMAZON_ES}" target="_blank">Conseguir el libro (ES)</a>
        <a class="btn-hero btn-ghost" href="${AMAZON_EN}" target="_blank">Get the book (EN)</a>
      </div>
    </section>

    <div class="divline"><span>✦</span></div>

    <!-- DOCTRINA -->
    <section class="sec" id="doctrina">
      <span class="sec-label">La Doctrina</span>
      <h2>El jardín no está perdido</h2>
      <p>Los adamitas llevan dos mil años siendo perseguidos por una idea insoportablemente simple: que el ser humano nació entero, puro y sin vergüenza, y puede recuperar ese estado.</p>
      <p>Este libro no es historia. Es doctrina viva. No una obra académica sobre el adamismo histórico, sino el texto que esos movimientos nunca pudieron escribir: los libros de escrituras originales que abarcan el cuerpo, el deseo, la ropa como símbolo de olvido, la comunidad sin jerarquía, el miedo, el amor y la alegría.</p>
      <p>La doctrina no exige creer en ningún dios. No exige comunidad. No exige ninguna práctica inmediata. Solo pide honestidad: la disposición de mirarte sin añadir ni quitar nada, y decidir que lo que encuentras es suficiente.</p>
      <div class="verses-block">
        <div class="verse-entry">
          <span class="verse-src">Libro I — Del Estado Original</span>
          <p class="verse-q">La Caída no fue un castigo divino. Fue el primer olvido. El día en que el ser humano aprendió a tener vergüenza de lo que era, comenzó a construir muros entre él y el mundo.</p>
        </div>
        <div class="verse-entry">
          <span class="verse-src">Libro IV — De la Ropa como Primer Olvido</span>
          <p class="verse-q">La ropa no es un pecado. Es algo más sutil y más triste: es un símbolo viviente del olvido. Cada prenda que llevas es una capa de distancia entre lo que eres y lo que recuerdas ser.</p>
        </div>
        <div class="verse-entry">
          <span class="verse-src">Libro XVIII — Del Miedo</span>
          <p class="verse-q">El cuerpo desnudo asusta porque no tiene dónde esconder el miedo. La ropa guarda posturas. El cuerpo sin tela es simplemente lo que es.</p>
        </div>
        <div class="verse-entry">
          <span class="verse-src">Meditaciones Finales</span>
          <p class="verse-q">Tú eres la frase. Todo lo demás fue paréntesis.</p>
        </div>
      </div>
    </section>

    <!-- EL LIBRO -->
    <div class="dark-band">
      <div style="max-width:820px;margin:0 auto;">
        <span class="sec-label" style="display:block;margin-bottom:1.8rem;">El libro</span>
        <h2 style="font-family:'Cormorant SC',serif;font-size:clamp(1.7rem,4vw,2.5rem);font-weight:300;color:var(--parch);margin-bottom:1.8rem;">24 libros de doctrina</h2>
        <p style="color:var(--cream);font-weight:300;margin-bottom:.5rem;font-size:1.05rem;">Desde el estado original hasta la alegría, el libro recorre cada dimensión de la vida humana a través de versículos cortos con el peso de dos milenios de pensamiento suprimido.</p>
        <p style="color:var(--faded);font-style:italic;margin-bottom:2rem;font-size:.95rem;">Incluye también El Camino de Vuelta — quince ejercicios prácticos —, la Cronología Adamita, el Glosario y las Preguntas del Jardín.</p>
        <div class="books-grid">
          ${books.map(([n,t])=>`<div class="book-cell"><span class="book-n">Libro ${n}</span><p class="book-t">${t}</p></div>`).join('')}
        </div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:2.5rem;">
          <a class="btn-hero btn-gold" href="${AMAZON_ES}" target="_blank" style="display:inline-block;">Comprar en Amazon ES</a>
          <a class="btn-hero btn-ghost" href="${AMAZON_EN}" target="_blank" style="display:inline-block;">Buy on Amazon EN</a>
        </div>
      </div>
    </div>

    <!-- FORO -->
    <section class="sec" style="text-align:center;">
      <span class="sec-label">La Comunidad</span>
      <h2>El foro del jardín</h2>
      <p style="max-width:520px;margin:0 auto 2rem;text-align:center;">Un lugar para los que recuerdan. Comparte, pregunta, sube fotos, responde. El registro es gratuito.</p>
      <button class="btn-hero btn-gold" onclick="goForum()" style="border:none;cursor:pointer;">Entrar al foro</button>
    </section>

    <div class="divline" style="margin:0 auto;max-width:720px;padding:0 2rem;"><span>✦</span></div>

    <!-- ESCRIBIR AL JARDÍN -->
    <section class="sec" id="contacto">
      <span class="sec-label">Escribir al Jardín</span>
      <h2>El jardín escucha</h2>
      <p style="max-width:540px;">Si tienes una pregunta, una duda, algo que quieras compartir directamente o simplemente quieres decir que algo de estas páginas te ha sonado a memoria — escribe aquí. No hace falta cuenta.</p>
      <div class="contact-form">
        <input class="contact-input" id="cName" placeholder="Tu nombre (opcional)">
        <input class="contact-input" id="cEmail" type="email" placeholder="Tu email (para que pueda responderte)">
        <textarea class="contact-ta" id="cMsg" placeholder="Escribe aquí..."></textarea>
        <div id="cMsg-status"></div>
        <button class="contact-send" onclick="sendContact()">Enviar al jardín</button>
        <p class="contact-note">El mensaje llega directamente a ${ADMIN}</p>
      </div>
    </section>

    <footer>Memorias del Principio · Los que Recuerdan · Primera edición, 2026</footer>
  </div>`
}

// ══════════════════════════════════════════════
//  FORO
// ══════════════════════════════════════════════
function forumPage() {
  const cats = [null,'doctrina','cuerpo','práctica','historia','preguntas','compartir']
  const catLabel = {null:'Todo el jardín',doctrina:'Doctrina',cuerpo:'El Cuerpo','práctica':'Práctica',historia:'Historia Adamita',preguntas:'Preguntas',compartir:'Compartir'}
  const sidebar = `
    <div class="sidebar">
      <span class="sb-label" style="padding:1.5rem 1.5rem .6rem;">Categorías</span>
      ${cats.map(c=>`
        <button class="sb-item ${S.category===c?'active':''}" onclick="setCategory(${c?`'${c}'`:'null'})">
          <span class="sb-dot"></span>${catLabel[c]||c}
        </button>`).join('')}
      <hr class="sb-sep">
      <button class="new-btn" onclick="S.view='new';S.postFiles=[];render()">+ Nueva entrada</button>
      <div class="sb-stat">
        <span class="sb-label" style="margin-top:.5rem;">El jardín</span>
        <div class="stat-row"><span class="stat-l">Miembros</span><span class="stat-v">${S.stats.members}</span></div>
        <div class="stat-row"><span class="stat-l">Entradas</span><span class="stat-v">${S.stats.posts}</span></div>
      </div>
    </div>
  `
  let main = ''
  if (S.view==='list') main = postList()
  else if (S.view==='post') main = postDetail()
  else if (S.view==='new') main = newPost()
  return `<div class="app-layout">${sidebar}<div class="content">${main}</div></div>`
}

function postList() {
  if (!S.posts.length) return `
    <div class="empty">
      <div class="empty-orn">✦</div>
      <div class="empty-t">El jardín está en silencio</div>
      <p style="color:var(--dim);font-size:.88rem;margin-top:.4rem;">Sé el primero en escribir.</p>
    </div>`
  return `
    <div style="margin-bottom:1.5rem;">
      <div style="font-family:'Cormorant SC',serif;font-size:1.2rem;font-weight:300;color:var(--parch);margin-bottom:.25rem;">El Foro del Jardín</div>
      <div style="color:var(--faded);font-style:italic;font-size:.9rem;">Un lugar para los que recuerdan</div>
    </div>
    ${S.posts.map(p=>{
      const imgs = tryParse(p.image_urls)
      return `
        <div class="post-card" onclick="openPost('${p.id}')">
          <div class="pc-top">
            <div style="flex:1;min-width:0;">
              <div class="pc-title">${esc(p.title)}</div>
              <div class="pc-preview">${esc((p.content||'').slice(0,130))}${(p.content||'').length>130?'…':''}</div>
              <div class="pc-meta">
                <span class="pc-author ${p.profiles?.is_admin?'is-admin':''}">${esc(p.profiles?.username||'Anónimo')}</span>
                <span>·</span><span>${fmtDate(p.created_at)}</span>
                <span>·</span><span>${p.replies?.[0]?.count||0} respuestas</span>
              </div>
            </div>
            <div class="pc-tags">
              ${p.has_garden_reply?'<span class="tag-garden">El Jardín respondió</span>':''}
              ${p.category?`<span class="tag-cat">${p.category}</span>`:''}
            </div>
            ${imgs.length?`<img class="pc-img" src="${imgs[0]}" alt="">`:''}
          </div>
        </div>`
    }).join('')}`
}

function postDetail() {
  const p = S.post
  if (!p) return '<div class="loading-msg">Cargando...</div>'
  const pImgs = tryParse(p.image_urls)
  return `
    <div style="max-width:700px;">
      <button class="back-btn" onclick="backToList()">← Volver al foro</button>
      <div class="pf">
        <div class="pf-title">${esc(p.title)}</div>
        <div class="pf-body">${esc(p.content)}</div>
        ${pImgs.length?`<div class="pf-images">${pImgs.map(u=>`<img class="pf-img" src="${u}" alt="" onclick="openLightbox('${u}')">`).join('')}</div>`:''}
        <div class="pf-meta">
          <span style="${p.profiles?.is_admin?'color:var(--gold)':'color:var(--sepia)'};font-style:italic;">${esc(p.profiles?.username||'Anónimo')}</span>
          · ${fmtDate(p.created_at)}
          ${p.category?`· <span style="font-family:'Cormorant SC',serif;font-size:.72rem;color:var(--faded);">${p.category}</span>`:''}
        </div>
      </div>
      <div class="replies-hdr">${S.replies.length} RESPUESTA${S.replies.length!==1?'S':''}</div>
      ${!S.replies.length?'<p style="color:var(--dim);font-style:italic;font-size:.88rem;margin-bottom:1.5rem;">Aún no hay respuestas.</p>':''}
      ${S.replies.map(r=>{
        const rImgs = tryParse(r.image_urls)
        return `
          <div class="reply-card ${r.profiles?.is_admin?'is-admin':''}">
            <div class="reply-hdr">
              <span class="reply-author ${r.profiles?.is_admin?'is-admin':''}">${esc(r.profiles?.username||'Anónimo')}</span>
              ${r.profiles?.is_admin?'<span class="reply-pill">El Jardín</span>':''}
              <span class="reply-date">${fmtDate(r.created_at)}</span>
            </div>
            <div class="reply-body">${esc(r.content)}</div>
            ${rImgs.length?`<div class="reply-imgs">${rImgs.map(u=>`<img class="reply-img" src="${u}" alt="" onclick="openLightbox('${u}')">`).join('')}</div>`:''}
          </div>`
      }).join('')}
      <div class="reply-form">
        <span class="reply-lbl">Tu respuesta</span>
        <textarea class="reply-ta" id="replyText" placeholder="Escribe aquí..."></textarea>
        <div class="upload-row">
          <input type="file" id="replyFiles" multiple accept="image/*" style="display:none" onchange="previewFiles(this,'reply')">
          <button class="upload-btn" onclick="document.getElementById('replyFiles').click()">📷 Añadir fotos</button>
          <span class="upload-note">Hasta 4 imágenes</span>
        </div>
        <div class="img-previews" id="replyPreviews"></div>
        <button class="send-btn" id="replyBtn" onclick="submitReply()">Enviar respuesta</button>
      </div>
    </div>`
}

function newPost() {
  const cats = ['doctrina','cuerpo','práctica','historia','preguntas','compartir']
  return `
    <div class="np">
      <div class="np-title">Nueva entrada</div>
      <div class="np-sub">Escribe lo que llevas. El jardín escucha.</div>
      <div class="form-group">
        <label class="form-label">Título</label>
        <input class="form-input" id="npTitle" placeholder="¿De qué quieres hablar?" maxlength="120">
      </div>
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <div class="cats-row">${cats.map(c=>`<button class="cat-btn" data-cat="${c}" onclick="selCat(this)">${c}</button>`).join('')}</div>
        <input type="hidden" id="npCat">
      </div>
      <div class="form-group">
        <label class="form-label">Entrada</label>
        <textarea class="form-input" id="npContent" style="min-height:160px;resize:vertical;" placeholder="Escribe aquí..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Fotos (opcional)</label>
        <div class="upload-row">
          <input type="file" id="postFiles" multiple accept="image/*" style="display:none" onchange="previewFiles(this,'post')">
          <button class="upload-btn" onclick="document.getElementById('postFiles').click()">📷 Añadir fotos</button>
          <span class="upload-note">Hasta 4 imágenes</span>
        </div>
        <div class="img-previews" id="postPreviews"></div>
      </div>
      <div id="npError"></div>
      <div style="display:flex;gap:.8rem;margin-top:.5rem;">
        <button class="send-btn" onclick="submitPost()">Publicar</button>
        <button class="upload-btn" style="padding:.6rem 1.2rem;" onclick="S.view='list';render()">Cancelar</button>
      </div>
    </div>`
}

// ══════════════════════════════════════════════
//  NAVEGACIÓN — UN SOLO CLIC AL FORO
// ══════════════════════════════════════════════
function goHome() { S.page='home'; render() }

async function goForum() {
  // Si no hay sesión → abrir login directamente, sin pantalla intermedia
  if (!S.user) {
    afterLoginDo = async () => {
      S.page='forum'; S.view='list'; S.postFiles=[]; S.replyFiles=[]
      await Promise.all([loadPosts(), loadStats()])
      render()
    }
    openModal('login')
    return
  }
  S.page='forum'; S.view='list'; S.postFiles=[]; S.replyFiles=[]
  await Promise.all([loadPosts(), loadStats()])
  render()
}

async function backToList() { S.view='list'; await loadPosts(); render() }

async function openPost(id) {
  await loadPost(id); S.view='post'; S.replyFiles=[]; render()
}

async function setCategory(cat) {
  S.category = cat==='null' ? null : cat
  await loadPosts(); render()
}

function selCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'))
  btn.classList.add('sel')
  document.getElementById('npCat').value = btn.dataset.cat
}

function scrollToContact() {
  S.page='home'
  render()
  setTimeout(() => {
    document.getElementById('contacto')?.scrollIntoView({ behavior:'smooth' })
  }, 100)
}

// ══════════════════════════════════════════════
//  AUTH MODAL
// ══════════════════════════════════════════════
function openModal(mode='login') {
  authMode = mode
  switchTab(mode)
  document.getElementById('authModal').classList.remove('hidden')
  document.getElementById('authMsg').innerHTML = ''
  setTimeout(() => document.getElementById('fEmail')?.focus(), 100)
}
function closeModal() {
  document.getElementById('authModal').classList.add('hidden')
  afterLoginDo = null
}
function switchTab(mode) {
  authMode = mode
  document.getElementById('tabLogin').classList.toggle('active', mode==='login')
  document.getElementById('tabReg').classList.toggle('active', mode==='register')
  document.getElementById('usernameRow').style.display = mode==='register' ? 'block' : 'none'
  document.getElementById('authBtn').textContent = mode==='login' ? 'Entrar' : 'Unirse al jardín'
  document.getElementById('authMsg').innerHTML = ''
}
function showMsg(msg, ok=false) {
  document.getElementById('authMsg').innerHTML =
    `<div class="${ok?'msg-ok':'msg-error'}">${msg}</div>`
}
async function doAuth() {
  const email = document.getElementById('fEmail')?.value?.trim()
  const pass  = document.getElementById('fPass')?.value
  if (!email||!pass) { showMsg('Completa email y contraseña'); return }
  document.getElementById('authBtn').disabled = true
  if (authMode==='login') {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass })
    if (error) { showMsg('Email o contraseña incorrectos'); document.getElementById('authBtn').disabled=false }
  } else {
    const username = document.getElementById('fUsername')?.value?.trim()
    if (!username) { showMsg('Elige un nombre para el jardín'); document.getElementById('authBtn').disabled=false; return }
    if (pass.length<6) { showMsg('La contraseña necesita al menos 6 caracteres'); document.getElementById('authBtn').disabled=false; return }
    const { data, error } = await sb.auth.signUp({ email, password: pass })
    if (error) { showMsg(error.message); document.getElementById('authBtn').disabled=false; return }
    if (data.user) await sb.from('profiles').upsert({ id: data.user.id, username, is_admin: email===ADMIN })
    showMsg('Revisa tu email para confirmar tu cuenta.', true)
  }
  document.getElementById('authBtn').disabled = false
}
document.getElementById('authModal').addEventListener('click', e => {
  if (e.target===e.currentTarget) closeModal()
})

// ══════════════════════════════════════════════
//  FORMULARIO DE CONTACTO
// ══════════════════════════════════════════════
function sendContact() {
  const name = document.getElementById('cName')?.value?.trim()
  const email = document.getElementById('cEmail')?.value?.trim()
  const msg  = document.getElementById('cMsg')?.value?.trim()
  const statusEl = document.getElementById('cMsg-status')

  if (!msg) {
    statusEl.innerHTML = '<div class="msg-error" style="margin-bottom:.8rem;">Escribe algo antes de enviar.</div>'
    return
  }

  const subject = encodeURIComponent(`Mensaje desde El Jardín${name?' de '+name:''}`)
  const body = encodeURIComponent(
    `${name?'Nombre: '+name+'\n':''}${email?'Email: '+email+'\n':''}\nMensaje:\n${msg}`
  )
  window.location.href = `mailto:${ADMIN}?subject=${subject}&body=${body}`

  statusEl.innerHTML = '<div class="msg-ok" style="margin-bottom:.8rem;">Abriendo tu cliente de email... Si no se abre, escríbenos directamente a ' + ADMIN + '</div>'
  document.getElementById('cName').value = ''
  document.getElementById('cEmail').value = ''
  document.getElementById('cMsg').value = ''
}

// ══════════════════════════════════════════════
//  FOTOS
// ══════════════════════════════════════════════
function previewFiles(input, ctx) {
  const files = Array.from(input.files).slice(0,4)
  const key = ctx==='post' ? 'postFiles' : 'replyFiles'
  S[key] = files
  const container = document.getElementById(ctx==='post'?'postPreviews':'replyPreviews')
  if (!container) return
  container.innerHTML = files.map((f,i) => {
    const url = URL.createObjectURL(f)
    return `<div class="img-preview-item"><img src="${url}"><button class="img-remove" onclick="removeFile(${i},'${ctx}')">✕</button></div>`
  }).join('')
}
function removeFile(idx, ctx) {
  const key = ctx==='post' ? 'postFiles' : 'replyFiles'
  S[key].splice(idx,1)
  previewFiles({ files: S[key] }, ctx)
}
async function uploadImages(files, folder) {
  const urls = []
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase()||'jpg'
    const path = `${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
    const { error } = await sb.storage.from('post-images').upload(path, file)
    if (!error) {
      const { data } = sb.storage.from('post-images').getPublicUrl(path)
      urls.push(data.publicUrl)
    }
  }
  return urls
}

// ══════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════
async function submitPost() {
  const title   = document.getElementById('npTitle')?.value?.trim()
  const content = document.getElementById('npContent')?.value?.trim()
  const cat     = document.getElementById('npCat')?.value || null
  const errEl   = document.getElementById('npError')
  if (!title)   { errEl.innerHTML='<div class="msg-error">El título es necesario</div>'; return }
  if (!content) { errEl.innerHTML='<div class="msg-error">Escribe algo antes de publicar</div>'; return }
  const btn = document.querySelector('.np .send-btn')
  if (btn) { btn.disabled=true; btn.textContent='Publicando...' }
  let imageUrls = []
  if (S.postFiles.length) imageUrls = await uploadImages(S.postFiles, `posts/${S.user.id}`)
  const { error } = await sb.from('posts').insert({
    user_id: S.user.id, title, content, category: cat,
    is_admin_post: S.isAdmin,
    image_urls: imageUrls.length ? JSON.stringify(imageUrls) : null
  })
  if (error) {
    errEl.innerHTML='<div class="msg-error">Error al publicar. Inténtalo de nuevo.</div>'
    if (btn) { btn.disabled=false; btn.textContent='Publicar' }
    return
  }
  S.postFiles=[]
  S.page='forum'; S.view='list'
  await Promise.all([loadPosts(), loadStats()])
  render()
}

async function submitReply() {
  const content = document.getElementById('replyText')?.value?.trim()
  if (!content) return
  const btn = document.getElementById('replyBtn')
  btn.disabled=true; btn.textContent='Enviando...'
  let imageUrls = []
  if (S.replyFiles.length) imageUrls = await uploadImages(S.replyFiles, `replies/${S.user.id}`)
  const { error } = await sb.from('replies').insert({
    post_id: S.post.id, user_id: S.user.id, content,
    is_admin_reply: S.isAdmin,
    image_urls: imageUrls.length ? JSON.stringify(imageUrls) : null
  })
  if (!error && S.isAdmin) {
    await sb.from('posts').update({ has_garden_reply: true }).eq('id', S.post.id)
  }
  S.replyFiles=[]
  await loadPost(S.post.id)
  render()
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function esc(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>')
}
function fmtDate(iso) {
  if (!iso) return ''
  const d=new Date(iso),now=new Date(),diff=now-d
  if (diff<60000) return 'ahora mismo'
  if (diff<3600000) return `hace ${Math.floor(diff/60000)} min`
  if (diff<86400000) return `hace ${Math.floor(diff/3600000)} h`
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'})
}
function tryParse(s) { try { return s?JSON.parse(s):[] } catch { return [] } }
function openLightbox(url) { document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.remove('hidden') }
function closeLightbox() { document.getElementById('lightbox').classList.add('hidden') }

init()
</script>
