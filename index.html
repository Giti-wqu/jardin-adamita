<script>
const SB_URL='https://fyosedvcdsfxgerysixb.supabase.co'
const SB_ANON='sb_publishable_UfOqWAj0TfPyVQK_g0wcKQ_eHqV-BDU'

const AMAZON_ES='https://www.amazon.es/dp/B0H33WHVJJ'

// ── Simple translation helper ─────────────────────────────────────────
const SUPPORTED=['es','en','de']
function getLang(){
  const url=new URLSearchParams(window.location.search).get('lang')
  if(url&&SUPPORTED.includes(url))return url
  const stored=localStorage.getItem('gardenLang')
  if(stored&&SUPPORTED.includes(stored))return stored
  const bl=navigator.language?.slice(0,2)||'es'
  return SUPPORTED.includes(bl)?bl:'es'
}
function ht(es,en,de){const l=S.lang;return l==='en'?en:l==='de'?de:es}
function setLang(l){S.lang=l;localStorage.setItem('gardenLang',l);document.documentElement.lang=l;render()}

// ── Temp email blocklist ──────────────────────────────────────────────
const TEMP=['mailinator.com','guerrillamail.com','temp-mail.org','throwaway.email','yopmail.com','sharklasers.com','grr.la','guerrillamail.info','guerrillamail.biz','guerrillamail.de','guerrillamail.net','guerrillamail.org','spam4.me','trashmail.com','trashmail.me','trashmail.net','trashmail.at','trashmail.io','trashmail.xyz','tempmail.com','temp-mail.io','10minutemail.com','10minutemail.net','dispostable.com','maildrop.cc','mailnull.com','mailnesia.com','spamgourmet.com','fakeinbox.com','incognitomail.com','discardmail.com','discardmail.de','mailexpire.com','filzmail.com','mytrashmail.com','getnada.com','throwam.com','burnermail.io','emailondeck.com','tempmailaddress.com','tempm.com','mailnow.top','emailtemp.org']

// ── State ─────────────────────────────────────────────────────────────
let S={

  page:'home',view:'list',
  posts:[],post:null,replies:[],
  category:null,
  stats:{posts:0,members:0},
  postFiles:[],replyFiles:[],msgFiles:[],
  messages:[],unreadCount:0,
  solicitudes:[],
  compartirAccess:null,
  expandedMsgs:{},
  afterLogin:null,
  usuarios:[],
  visitStats:null,
  lang:getLang()
}
let authMode='login'
let currentLbUrl=''

// ── Init ──────────────────────────────────────────────────────────────
async function init(){
  document.documentElement.lang=S.lang
  const{data:{session}}=await sb.auth.getSession()
  if(session?.user)await signedIn(session.user)
  // Only count visit if NOT admin
  setTimeout(async()=>{if(!S.isAdmin)await sb.from('visits').insert({is_registered:!!S.user})},1500)
  render()
  sb.auth.onAuthStateChange(async(ev,session)=>{
    if(ev==='SIGNED_IN'){
      await signedIn(session.user);closeModal()
      if(S.afterLogin){const f=S.afterLogin;S.afterLogin=null;await f()}
      else{await loadPosts();await loadStats();render()}
    }
    if(ev==='SIGNED_OUT'){
      Object.assign(S,{user:null,profile:null,isAdmin:false,page:'home',
        messages:[],unreadCount:0,solicitudes:[],compartirAccess:null})
      render()
    }
  })
}

async function signedIn(u){
  S.user=u;S.isAdmin=u.email===ADMIN
  const{data}=await sb.from('profiles').select('*').eq('id',u.id).single()
  if(data){S.profile=data;sb.from('profiles').update({last_seen_at:new Date().toISOString(),email:u.email}).eq('id',u.id);return}
  const un=S.isAdmin?'El Jardín':u.email.split('@')[0]
  const{data:p}=await sb.from('profiles').insert({id:u.id,username:un,is_admin:S.isAdmin,email:u.email}).select().single()
  S.profile=p
}

async function loadPosts(){
  let q=sb.from('posts').select('*, profiles(username,is_admin), replies(count)').order('created_at',{ascending:false})
  if(S.category)q=q.eq('category',S.category)
  const{data}=await q;S.posts=data||[]
}
async function loadPost(id){
  const[{data:p},{data:r}]=await Promise.all([
    sb.from('posts').select('*, profiles(username,is_admin)').eq('id',id).single(),
    sb.from('replies').select('*, profiles(username,is_admin)').eq('post_id',id).order('created_at',{ascending:true})
  ]);S.post=p;S.replies=r||[]
}
async function loadStats(){
  const[{count:p},{count:m}]=await Promise.all([
    sb.from('posts').select('*',{count:'exact',head:true}),
    sb.from('profiles').select('*',{count:'exact',head:true})
  ]);S.stats={posts:p||0,members:m||0}
}
async function loadMessages(){
  const{data}=await sb.from('private_messages').select('*, profiles(username)').order('created_at',{ascending:false})
  S.messages=data||[];S.unreadCount=S.messages.filter(m=>!m.is_read).length
}
async function loadSolicitudes(){
  const{data}=await sb.from('compartir_access').select('*, profiles(username)').eq('status','pending').order('created_at',{ascending:true})
  S.solicitudes=data||[]
}
async function checkCompartirAccess(){
  if(!S.user){S.compartirAccess='none';return}
  const{data}=await sb.from('compartir_access').select('status').eq('user_id',S.user.id).single()
  S.compartirAccess=data?data.status:'none'
}
async function loadUsuarios(){
  const{data}=await sb.from('profiles').select('*').order('created_at',{ascending:false})
  S.usuarios=data||[]
}
async function loadVisitStats(){
  const{data}=await sb.from('visits').select('is_registered, visited_at').order('visited_at',{ascending:false})
  if(!data){S.visitStats=null;return}
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),week=new Date(today)
  week.setDate(week.getDate()-7)
  S.visitStats={
    totalAll:data.length,totalAnon:data.filter(v=>!v.is_registered).length,totalReg:data.filter(v=>v.is_registered).length,
    todayAll:data.filter(v=>new Date(v.visited_at)>=today).length,todayAnon:data.filter(v=>!v.is_registered&&new Date(v.visited_at)>=today).length,
    weekAll:data.filter(v=>new Date(v.visited_at)>=week).length,weekAnon:data.filter(v=>!v.is_registered&&new Date(v.visited_at)>=week).length,
    last10:data.slice(0,10)
  }
}

  const adminNav=S.isAdmin?`
    <button class="tnav ${S.page==='inbox'?'active':''}" onclick="goInbox()">Mensajes${unread}</button>
    <button class="tnav ${S.page==='solicitudes'?'active':''}" onclick="goSolicitudes()">Solicitudes</button>
    <button class="tnav ${S.page==='usuarios'?'active':''}" onclick="goUsuarios()">Usuarios</button>
    <button class="tnav ${S.page==='visitas'?'active':''}" onclick="goVisitas()">Visitas</button>`
    :''
  const langSw=`<div class="lang-sw">
    <button class="ls-btn ${S.lang==='es'?'active':''}" onclick="setLang('es')">ES</button>
    <button class="ls-btn ${S.lang==='en'?'active':''}" onclick="setLang('en')">EN</button>

  const right=S.user?`<div class="topright">${langSw}<span class="user-name">${esc(S.profile?.username||'')}</span>${S.isAdmin?'<span class="admin-pill">El Jardín</span>':''}<button class="btn-signout" onclick="sb.auth.signOut()">Salir</button></div>`
    :`<div class="topright">${langSw}<button class="btn-login" onclick="openModal('login')">Entrar</button><button class="btn-register" onclick="openModal('register')">Unirse</button></div>`
  return `<header class="topbar">
    <div class="logo" onclick="goHome()">Movimiento Edénico <span>Los Adánicos</span></div>
    <nav class="topnav">
      <button class="tnav ${S.page==='home'?'active':''}" onclick="goHome()">Inicio</button>

      <button class="tnav" onclick="scrollToContact()">Escribir</button>
      ${adminNav}
    </nav>
    ${right}
  </header>`
}

function body(){

  if(S.page==='forum')return forumPage()

  if(S.page==='solicitudes')return solicitudesPage()
  if(S.page==='usuarios')return usuariosPage()
  if(S.page==='visitas')return visitasPage()
  return homePage()

  const catLabel={null:'Todo el jardín',doctrina:'Doctrina',cuerpo:'El Cuerpo','práctica':'Práctica',historia:'Historia Adamita',preguntas:'Preguntas',compartir:'🔒 Compartir'}
  const sidebar=`<div class="sidebar">
    <span class="sb-label" style="padding:1.5rem 1.4rem .55rem;">Categorías</span>
    ${cats.map(c=>`<button class="sb-item ${S.category===c?'active':''}" onclick="setCategory(${c?`'${c}'`:'null'})"><span class="sb-dot"></span>${catLabel[c]||c}</button>`).join('')}
    <hr class="sb-sep">
    <button class="new-btn" onclick="S.view='new';S.postFiles=[];render()">+ Nueva entrada</button>
    ${S.isAdmin?`<button class="new-btn" style="margin-top:.5rem;color:var(--faded);" onclick="goSolicitudes()">Solicitudes compartir</button>`:''}
    <div class="sb-stat">

      <div class="stat-row"><span class="stat-l">Miembros</span><span class="stat-v">${S.stats.members}</span></div>
      <div class="stat-row"><span class="stat-l">Entradas</span><span class="stat-v">${S.stats.posts}</span></div>
    </div>
  </div>`
  let main=''
  if(S.view==='list')main=postList()
  else if(S.view==='post')main=postDetail()
  else if(S.view==='new')main=newPost()
  return `<div class="app-layout">${sidebar}<div class="content">${main}</div></div>`
}

// ── AUTH ──────────────────────────────────────────────────────────────
function openModal(mode='login'){authMode=mode;switchTab(mode);document.getElementById('authModal').classList.remove('hidden');document.getElementById('authMsg').innerHTML='';setTimeout(()=>document.getElementById('fEmail')?.focus(),100)}
function closeModal(){document.getElementById('authModal').classList.add('hidden');S.afterLogin=null}
function switchTab(mode){
  authMode=mode
  document.getElementById('tabLogin').classList.toggle('active',mode==='login')
  document.getElementById('tabReg').classList.toggle('active',mode==='register')
  document.getElementById('usernameRow').style.display=mode==='register'?'block':'none'
  document.getElementById('authBtn').textContent=mode==='login'?'Entrar':'Unirse al jardín'
  document.getElementById('authMsg').innerHTML=''
}
function showAuthMsg(msg,ok=false){document.getElementById('authMsg').innerHTML=`<div class="${ok?'msg-ok':'msg-error'}">${msg}</div>`}

const TEMP_DOMAINS=['mailinator.com','guerrillamail.com','temp-mail.org','throwaway.email','yopmail.com','sharklasers.com','grr.la','guerrillamail.info','guerrillamail.biz','guerrillamail.de','guerrillamail.net','guerrillamail.org','spam4.me','trashmail.com','trashmail.me','trashmail.net','trashmail.at','trashmail.io','trashmail.xyz','tempmail.com','temp-mail.io','10minutemail.com','dispostable.com','maildrop.cc','mailnull.com','fakeinbox.com','incognitomail.com','discardmail.com','mailexpire.com','mytrashmail.com','getnada.com','throwam.com','burnermail.io','emailondeck.com']

async function doAuth(){
  const email=document.getElementById('fEmail')?.value?.trim()
  const pass=document.getElementById('fPass')?.value
  if(!email||!pass){showAuthMsg('Completa email y contraseña');return}
  if(authMode==='register'){
    const domain=email.split('@')[1]?.toLowerCase()
    if(TEMP_DOMAINS.includes(domain)){showAuthMsg('Este tipo de email no está permitido. Usa tu email personal.');return}
  }
  document.getElementById('authBtn').disabled=true
  if(authMode==='login'){
    const{error}=await sb.auth.signInWithPassword({email,password:pass})
    if(error){showAuthMsg('Email o contraseña incorrectos');document.getElementById('authBtn').disabled=false}
  }else{
    const username=document.getElementById('fUsername')?.value?.trim()
    if(!username){showAuthMsg('Elige un nombre para el jardín');document.getElementById('authBtn').disabled=false;return}
    if(pass.length<6){showAuthMsg('Mínimo 6 caracteres');document.getElementById('authBtn').disabled=false;return}
    const{data,error}=await sb.auth.signUp({email,password:pass})
    if(error){showAuthMsg(error.message);document.getElementById('authBtn').disabled=false;return}
    if(data.user)await sb.from('profiles').upsert({id:data.user.id,username,is_admin:email===ADMIN})
    showAuthMsg('Revisa tu email para confirmar tu cuenta.',true)
  }
  document.getElementById('authBtn').disabled=false
}
document.getElementById('authModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()})

// ── PHOTOS ────────────────────────────────────────────────────────────
function previewFiles(input,ctx){
  const files=Array.from(input.files).slice(0,4)
  const key={post:'postFiles',reply:'replyFiles',msg:'msgFiles'}[ctx]
  S[key]=files
  const cid={post:'postPreviews',reply:'replyPreviews',msg:'msgPreviews'}[ctx]
  const container=document.getElementById(cid);if(!container)return
  container.innerHTML=files.map((f,i)=>{const url=URL.createObjectURL(f);return`<div class="img-preview-item"><img src="${url}"><button class="img-remove" onclick="removeFile(${i},'${ctx}')">✕</button></div>`}).join('')
}
function removeFile(idx,ctx){const key={post:'postFiles',reply:'replyFiles',msg:'msgFiles'}[ctx];S[key].splice(idx,1);previewFiles({files:S[key]},ctx)}
async function uploadImages(files,folder){
  const urls=[]
  for(const file of files){
    const ext=file.name.split('.').pop().toLowerCase()||'jpg'
    const path=`${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
    const{error}=await sb.storage.from('post-images').upload(path,file)
    if(!error){const{data}=sb.storage.from('post-images').getPublicUrl(path);urls.push(data.publicUrl)}
  }
  return urls
}

// ── SUBMIT ────────────────────────────────────────────────────────────
async function submitPost(){
  const title=document.getElementById('npTitle')?.value?.trim()
  const content=document.getElementById('npContent')?.value?.trim()
  const cat=document.getElementById('npCat')?.value||null
  const errEl=document.getElementById('npError')
  if(!title){errEl.innerHTML='<div class="msg-error">El título es necesario</div>';return}
  if(!content){errEl.innerHTML='<div class="msg-error">Escribe algo antes de publicar</div>';return}
  if(cat==='compartir'&&!S.isAdmin&&S.compartirAccess!=='approved'){errEl.innerHTML='<div class="msg-error">Necesitas acceso aprobado para publicar en Compartir</div>';return}
  const btn=document.querySelector('.np .send-btn');if(btn){btn.disabled=true;btn.textContent='Publicando...'}
  let imageUrls=[]
  if(S.postFiles.length)imageUrls=await uploadImages(S.postFiles,`posts/${S.user.id}`)
  const{error}=await sb.from('posts').insert({user_id:S.user.id,title,content,category:cat,is_admin_post:S.isAdmin,image_urls:imageUrls.length?JSON.stringify(imageUrls):null})
  if(error){errEl.innerHTML='<div class="msg-error">Error al publicar</div>';if(btn){btn.disabled=false;btn.textContent='Publicar'};return}
  S.postFiles=[];S.page='forum';S.view='list';await Promise.all([loadPosts(),loadStats()]);render()
}
async function submitReply(){
  const content=document.getElementById('replyText')?.value?.trim();if(!content)return
  const btn=document.getElementById('replyBtn');btn.disabled=true;btn.textContent='Enviando...'
  let imageUrls=[]
  if(S.replyFiles.length)imageUrls=await uploadImages(S.replyFiles,`replies/${S.user.id}`)
  const{error}=await sb.from('replies').insert({post_id:S.post.id,user_id:S.user.id,content,is_admin_reply:S.isAdmin,image_urls:imageUrls.length?JSON.stringify(imageUrls):null})
  if(!error&&S.isAdmin)await sb.from('posts').update({has_garden_reply:true}).eq('id',S.post.id)
  S.replyFiles=[];await loadPost(S.post.id);render()
}
async function sendPrivateMsg(){
  const content=document.getElementById('privMsgText')?.value?.trim()
  if(!content){alert('Escribe algo antes de enviar');return}
  const btn=document.getElementById('msgBtn');btn.disabled=true;btn.textContent='Enviando...'
  let imageUrls=[]
  if(S.msgFiles.length)imageUrls=await uploadImages(S.msgFiles,`msgs/${S.user.id}`)
  const{error}=await sb.from('private_messages').insert({user_id:S.user.id,content,image_urls:imageUrls.length?JSON.stringify(imageUrls):null})
  if(!error){document.getElementById('privMsgText').value='';S.msgFiles=[];const pre=document.getElementById('msgPreviews');if(pre)pre.innerHTML='';btn.textContent='✓ Enviado';setTimeout(()=>{btn.disabled=false;btn.textContent='Enviar mensaje privado'},2500)}
  else{btn.disabled=false;btn.textContent='Enviar mensaje privado'}
}

// ── INBOX ACTIONS ─────────────────────────────────────────────────────
async function toggleMsg(id){
  if(!S.expandedMsgs[id]){S.expandedMsgs[id]=true;await sb.from('private_messages').update({is_read:true}).eq('id',id);S.unreadCount=Math.max(0,S.unreadCount-1);const m=S.messages.find(m=>m.id===id);if(m)m.is_read=true}
  else{delete S.expandedMsgs[id]}
  render()
}
async function markRead(id){await sb.from('private_messages').update({is_read:true}).eq('id',id);const m=S.messages.find(m=>m.id===id);if(m)m.is_read=true;S.unreadCount=Math.max(0,S.unreadCount-1);render()}
async function deleteMessage(id){if(!confirm('¿Borrar este mensaje?'))return;await sb.from('private_messages').delete().eq('id',id);S.messages=S.messages.filter(m=>m.id!==id);S.unreadCount=S.messages.filter(m=>!m.is_read).length;render()}

// ── COMPARTIR ─────────────────────────────────────────────────────────
async function requestCompartirAccess(){
  if(!S.user){openModal('register');return}
  const{error}=await sb.from('compartir_access').insert({user_id:S.user.id,status:'pending'})
  if(!error||error.code==='23505'){S.compartirAccess='pending';render()}
}
async function decideCompartir(solId,status){await sb.from('compartir_access').update({status}).eq('id',solId);S.solicitudes=S.solicitudes.filter(s=>s.id!==solId);render()}

// ── DELETE ────────────────────────────────────────────────────────────
async function deletePost(id){
  if(!confirm('¿Borrar esta entrada y todas sus respuestas?'))return
  await sb.from('replies').delete().eq('post_id',id)
  await sb.from('posts').delete().eq('id',id)
  if(S.view==='post'){S.view='list';await loadPosts();render()}
  else{S.posts=S.posts.filter(p=>p.id!==id);render()}
}
async function deleteReply(id){if(!confirm('¿Borrar esta respuesta?'))return;await sb.from('replies').delete().eq('id',id);S.replies=S.replies.filter(r=>r.id!==id);render()}

// ── CONTACT ───────────────────────────────────────────────────────────
function sendContact(){
  const name=document.getElementById('cName')?.value?.trim()
  const email=document.getElementById('cEmail')?.value?.trim()
  const msg=document.getElementById('cMsg')?.value?.trim()
  const st=document.getElementById('cStatus')
  if(!msg){st.innerHTML='<div class="msg-error" style="margin-bottom:.8rem;">Escribe algo antes de enviar.</div>';return}
  const sub=encodeURIComponent(`Mensaje desde El Jardín${name?' de '+name:''}`)
  const body=encodeURIComponent(`${name?'Nombre: '+name+'\n':''}${email?'Email: '+email+'\n':''}\nMensaje:\n${msg}`)
  window.location.href=`mailto:${ADMIN}?subject=${sub}&body=${body}`
  st.innerHTML='<div class="msg-ok" style="margin-bottom:.8rem;">Abriendo tu cliente de email...</div>'
}

// ── PHOTO PROTECTION & WATERMARK ─────────────────────────────────────
function wmHtml(username,rows=6,cols=4){
  const t2=esc(username)+' · El Jardín'
  const row=Array(cols).fill(`<span class="wm-text">${t2}</span>`).join('')
  return Array(rows).fill(`<div class="wm-row">${row}</div>`).join('')
}
function protectedImg(url,postId='',small=false){
  if(!url)return''
  const size=small?'max-width:65px;max-height:48px;':'max-width:240px;max-height:200px;'
  if(S.isAdmin){
    return`<div class="admin-img-wrap" onclick="openLightbox('${url}','${postId}')"><img src="${url}" style="${size}object-fit:cover;border:1px solid var(--border);" draggable="false"><a class="dl-btn" onclick="event.stopPropagation();downloadImage('${url}')">⬇</a></div>`
  }
  const wm=wmHtml(S.profile?.username||'visitante',small?3:6,small?2:4)
  return`<div class="protected-wrap" style="${size}object-fit:cover;" oncontextmenu="return false" ondragstart="return false" onclick="openLightbox('${url}','${postId}')"><img src="${url}" style="${size}object-fit:cover;border:1px solid var(--border);" draggable="false"><div class="wm-overlay"><div class="wm-inner">${wm}</div></div></div>`
}
async function logPhotoView(postId){if(!S.user||!postId||S.isAdmin)return;await sb.from('photo_views').insert({post_id:postId,user_id:S.user.id,username:S.profile?.username||'Anónimo'})}
async function loadPhotoViews(postId){if(!S.isAdmin||!postId)return[];const{data}=await sb.from('photo_views').select('username, viewed_at').eq('post_id',postId).order('viewed_at',{ascending:false});return data||[]}
async function downloadImage(url){try{const res=await fetch(url);const blob=await res.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jardin-'+Date.now()+'.'+(blob.type.split('/')[1]||'jpg');a.click();URL.revokeObjectURL(a.href)}catch(e){window.open(url,'_blank')}}

function openLightbox(url,postId=''){
  currentLbUrl=url
  document.getElementById('lbImg').src=url
  document.getElementById('lightbox').classList.remove('hidden')
  document.getElementById('lightboxBg').style.display='block'
  const wmEl=document.getElementById('lbWm')
  const dlEl=document.getElementById('lbDl')
  if(S.isAdmin){wmEl.classList.add('hidden');dlEl.classList.remove('hidden')}
  else{document.getElementById('lbWmInner').innerHTML=wmHtml(S.profile?.username||'visitante',8,5);wmEl.classList.remove('hidden');dlEl.classList.add('hidden');if(postId)logPhotoView(postId)}
}
function closeLightbox(){document.getElementById('lightbox').classList.add('hidden');document.getElementById('lightboxBg').style.display='none';currentLbUrl=''}

// ── UTILS ─────────────────────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>')}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=now-d;if(diff<60000)return'ahora mismo';if(diff<3600000)return`hace ${Math.floor(diff/60000)} min`;if(diff<86400000)return`hace ${Math.floor(diff/3600000)} h`;return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}
function tryParse(s){try{return s?JSON.parse(s):[]}catch{return[]}}

init()
</script>
